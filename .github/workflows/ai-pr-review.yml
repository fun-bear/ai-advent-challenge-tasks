name: Auto PR Comment

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  build-and-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Для получения diff
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      #- name: Test
      #  run: dotnet test --no-build --verbosity normal

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Get PR diff
        id: diff
        run: |
          diff=$(git diff origin/${{ github.base_ref }}...HEAD)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$diff" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Fetch RAG context
        id: rag
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          query=$(printf "%s\n\n%s" "$PR_TITLE" "$PR_BODY")

          jq -n --arg query "$query" '{ query: $query }' > rag_request.json

          if curl -sS --fail-with-body -X POST "https://blog-haste-halt.ngrok-free.dev/search" \
            -H "Content-Type: application/json" \
            --data-binary @rag_request.json > rag_response.json; then
            if jq -e . rag_response.json > /dev/null 2>&1; then
              rag_context=$(jq -r '
                if type == "array" then
                  if length == 0 then "RAG: релевантные чанки не найдены."
                  else map("[score=\(.score // \"n/a\")] \(.file // \"unknown\") :: \(.title // \"untitled\")\\n\(.text // \"\")") | join("\\n\\n---\\n\\n") end
                elif type == "object" and (.items? | type == "array") then
                  if (.items | length) == 0 then "RAG: релевантные чанки не найдены."
                  else .items | map("[score=\(.score // \"n/a\")] \(.file // \"unknown\") :: \(.title // \"untitled\")\\n\(.text // \"\")") | join("\\n\\n---\\n\\n") end
                else
                  "RAG: не удалось распарсить структуру search-ответа."
                end
              ' rag_response.json)
            else
              rag_context="RAG: endpoint вернул невалидный JSON, контекст недоступен."
            fi
          else
            rag_context="RAG: не удалось получить контекст (ошибка HTTP при вызове search endpoint)."
          fi

          {
            echo "rag_context<<EOF"
            echo "$rag_context"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: AI Code Review
        env:
          ROUTERAI_API_KEY: ${{ secrets.ROUTERAI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          RAG_CONTEXT: ${{ steps.rag.outputs.rag_context }}
        run: |
          # Формируем JSON безопасно (с корректным экранированием многострочного diff)
          jq -n \
            --arg diff "$PR_DIFF" \
            --arg prTitle "$PR_TITLE" \
            --arg prBody "$PR_BODY" \
            --arg rag "$RAG_CONTEXT" \
            '{
              model: "openai/gpt-5.4",
              messages: [
                {
                  role: "system",
                  content: "Ты опытный код‑ревьюер. Анализируй diff, находи баги, архитектурные проблемы, давай рекомендации. Используй RAG-контекст как дополнительную справочную информацию по проекту. Если diff пустой или неполный — явно сообщи об этом."
                },
                {
                  role: "user",
                  content: (
                    "PR title:\n" + $prTitle +
                    "\n\nPR description:\n" + ($prBody // "") +
                    "\n\nRAG context:\n" + $rag +
                    "\n\nПроанализируй этот PR diff:\n" + $diff
                  )
                }
              ]
            }' > review_payload.json

          curl -sS -X POST "https://routerai.ru/api/v1/chat/completions" \
            -H "Authorization: Bearer $ROUTERAI_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @review_payload.json > review_response.json

          # В комментарий отправляем только краткую сводку входных данных и ответ модели.
          # Полный payload не публикуем, чтобы не засорять PR и не путать с «кодом run».
          {
            echo "=== REQUEST SUMMARY ==="
            echo "PR title: $PR_TITLE"
            echo "PR description length: ${#PR_BODY}"
            echo "PR diff length: ${#PR_DIFF}"
            echo "RAG context length: ${#RAG_CONTEXT}"
            echo
            echo "=== LLM RESPONSE ==="
            jq -r '.choices[0].message.content // .choices[0].message.reasoning // "Пустой ответ от модели"' review_response.json
          } > review.txt

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Code Review\n\n${review}`
            });
