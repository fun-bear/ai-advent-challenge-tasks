name: Auto PR Comment

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  build-and-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Для получения diff
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Get PR diff
        id: diff
        run: |
          set -euo pipefail

          # Предпочитаем diff по merge-base (triple-dot), но если merge-base
          # недоступен (например, из-за неполной истории), используем fallback.
          if diff=$(git diff origin/${{ github.base_ref }}...HEAD); then
            echo "Using triple-dot diff (merge-base based)."
          else
            echo "Triple-dot diff failed, fallback to two-dot diff."
            diff=$(git diff origin/${{ github.base_ref }}..HEAD)
          fi

          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$diff" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Fetch RAG context
        id: rag
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          MCP_URL="https://blog-haste-halt.ngrok-free.dev/"

          # Формируем query
          query=$(printf "%s\n\n%s" "$PR_TITLE" "$PR_BODY")
          echo "Query length: ${#query} символов"

          # Создаём JSON-RPC запрос к MCP tool `search`
          jq -n --arg query "$query" '{
            jsonrpc: "2.0",
            id: 1,
            method: "tools/call",
            params: {
              name: "search",
              arguments: {
                query: $query
              }
            }
          }' > rag_request.json

          # Создаём initialize-запрос (MCP handshake)
          jq -n '{
            jsonrpc: "2.0",
            id: "init-1",
            method: "initialize",
            params: {
              protocolVersion: "2024-11-05",
              capabilities: {},
              clientInfo: {
                name: "github-actions-ai-pr-review",
                version: "1.0.0"
              }
            }
          }' > mcp_init_request.json

          # Проверяем JSON
          if ! jq -e . rag_request.json > /dev/null 2>&1; then
            echo "❌ rag_request.json невалиден"
            cat rag_request.json
            rag_context="RAG: ошибка формирования запроса (невалидный JSON)"
            echo "rag_context<<EOF" >> $GITHUB_OUTPUT
            echo "$rag_context" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 0  # Не прерываем workflow, но помечаем ошибку
          fi

          echo "📤 Инициализируем MCP-сессию..."
          curl -sS --max-time 30 --connect-timeout 10 -X POST \
            "$MCP_URL" \
            -H "Content-Type: application/json" \
            -H "ngrok-skip-browser-warning: true" \
            --data-binary @mcp_init_request.json \
            -D mcp_init_headers.txt > mcp_init_response.sse 2> curl_errors.txt || {
            HTTP_EXIT_CODE=$?
            echo "❌ initialize curl завершился с кодом: $HTTP_EXIT_CODE"
            echo "Ошибки curl:"
            cat curl_errors.txt
            rag_context="RAG: не удалось инициализировать MCP-сессию (curl exit code: $HTTP_EXIT_CODE)"
            echo "rag_context<<EOF" >> $GITHUB_OUTPUT
            echo "$rag_context" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 0
          }

          MCP_SESSION_ID=$(awk 'BEGIN{IGNORECASE=1} /^Mcp-Session-Id:/ {gsub("\r", "", $2); print $2}' mcp_init_headers.txt | tail -n1)
          if [ -z "$MCP_SESSION_ID" ]; then
            echo "❌ Не удалось получить Mcp-Session-Id из initialize-ответа"
            echo "Headers:"
            cat mcp_init_headers.txt
            rag_context="RAG: initialize выполнен, но сервер не вернул Mcp-Session-Id"
            echo "rag_context<<EOF" >> $GITHUB_OUTPUT
            echo "$rag_context" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "✅ MCP инициализирован, Session ID получен"
          echo "📤 Отправляем tools/call(search) к MCP endpoint..."
          curl -sS --max-time 30 --connect-timeout 10 -X POST \
            "$MCP_URL" \
            -H "Content-Type: application/json" \
            -H "Mcp-Session-Id: $MCP_SESSION_ID" \
            -H "ngrok-skip-browser-warning: true" \
            --data-binary @rag_request.json > rag_response.sse 2> curl_errors.txt || {
            HTTP_EXIT_CODE=$?
            echo "❌ curl завершился с кодом: $HTTP_EXIT_CODE"
            echo "Ошибки curl:"
            cat curl_errors.txt
            rag_context="RAG: не удалось получить контекст (curl exit code: $HTTP_EXIT_CODE)"
            echo "rag_context<<EOF" >> $GITHUB_OUTPUT
            echo "$rag_context" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 0
          }

          echo "📥 SSE-ответ получен, размер: $(wc -c < rag_response.sse) байт"

          # MCP over HTTP может вернуть SSE (data: {...}). Извлекаем JSON payload.
          sed -n 's/^data: //p' rag_response.sse | tail -n 1 > rag_response.json

          if [ ! -s rag_response.json ]; then
            echo "❌ Не удалось извлечь JSON из SSE-ответа"
            cat rag_response.sse
            rag_context="RAG: MCP вернул неожиданный формат ответа (SSE без data JSON)."
            echo "rag_context<<EOF" >> $GITHUB_OUTPUT
            echo "$rag_context" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Проверяем JSON ответа MCP
          if jq -e . rag_response.json > /dev/null 2>&1; then
            # MCP tools/call обычно возвращает result.content[] с text-полями.
            rag_context=$(jq -r '
              if .error? then
                "RAG: MCP вернул ошибку: " + (.error.message // "unknown error")
              elif (.result.content? | type == "array") then
                (.result.content
                  | map(
                      if .type == "text" then .text
                      else (.|tostring)
                      end
                    )
                  | join("\n\n---\n\n")
                )
              else
                "RAG: не удалось распарсить MCP-ответ tools/call."
              end
            ' rag_response.json)

            if [ -z "$rag_context" ] || [ "$rag_context" = "null" ]; then
              rag_context="RAG: релевантные чанки не найдены."
            fi
          else
            echo "❌ Ответ невалиден, содержимое:"
            cat rag_response.json
            rag_context="RAG: endpoint вернул невалидный JSON, контекст недоступен."
          fi

          # Исправление: используем уникальный разделитель вместо EOF
          {
            echo "rag_context<<RAG_EOF"
            echo "$rag_context"
            echo "RAG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      #- name: Test
      #  run: dotnet test --no-build --verbosity normal

      - name: AI Code Review
        env:
          ROUTERAI_API_KEY: ${{ secrets.ROUTERAI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          RAG_CONTEXT: ${{ steps.rag.outputs.rag_context }}
        run: |
          # Формируем JSON безопасно (с корректным экранированием многострочного diff)
          jq -n \
            --arg diff "$PR_DIFF" \
            --arg prTitle "$PR_TITLE" \
            --arg prBody "$PR_BODY" \
            --arg rag "$RAG_CONTEXT" \
            '{
              model: "openai/gpt-5.4",
              messages: [
                {
                  role: "system",
                  content: "Ты опытный код‑ревьюер. Анализируй diff, находи баги, архитектурные проблемы, давай рекомендации. Используй RAG-контекст как дополнительную справочную информацию по проекту. Если diff пустой или неполный — явно сообщи об этом."
                },
                {
                  role: "user",
                  content: (
                    "PR title:\n" + $prTitle +
                    "\n\nPR description:\n" + ($prBody // "") +
                    "\n\nRAG context:\n" + $rag +
                    "\n\nПроанализируй этот PR diff:\n" + $diff
                  )
                }
              ]
            }' > review_payload.json

          curl -sS -X POST "https://routerai.ru/api/v1/chat/completions" \
            -H "Authorization: Bearer $ROUTERAI_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @review_payload.json > review_response.json

          # В комментарий отправляем только краткую сводку входных данных и ответ модели.
          # Полный payload не публикуем, чтобы не засорять PR и не путать с «кодом run».
          {
            echo "=== REQUEST SUMMARY ==="
            echo "PR title: $PR_TITLE"
            echo "PR description length: ${#PR_BODY}"
            echo "PR diff length: ${#PR_DIFF}"
            echo "RAG context length: ${#RAG_CONTEXT}"
            echo
            echo "=== LLM RESPONSE ==="
            jq -r '.choices[0].message.content // .choices[0].message.reasoning // "Пустой ответ от модели"' review_response.json
          } > review.txt

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Code Review\n\n${review}`
            });
