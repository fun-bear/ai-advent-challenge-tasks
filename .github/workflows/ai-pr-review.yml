name: Auto PR Comment

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  build-and-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Для получения diff

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      #- name: Test
      #  run: dotnet test --no-build --verbosity normal

      - name: Get PR diff
        id: diff
        run: |
          diff=$(git diff origin/${{ github.base_ref }}...HEAD)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$diff" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Code Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Пример вызова OpenAI API (замените на свой RAG‑сервис)
          curl -X POST "https://routerai.ru/api/v1/chat/completions" \
            -H "Authorization: Bearer $ROUTERAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "openai/gpt-5.4",
              "messages": [
                {
                  "role": "system",
                  "content": "Ты опытный код‑ревьюер. Анализируй diff, находи баги, архитектурные проблемы, давай рекомендации."
                },
                {
                  "role": "user", 
                  "content": "Проанализируй этот PR diff:\n${{ steps.diff.outputs.diff }}"
                }
              ]
            }' > review_response.json

          # Извлекаем текст ревью из ответа
          jq -r '.choices[0].message.content' review_response.json > review.txt

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Code Review\n\n${review}`
            });
